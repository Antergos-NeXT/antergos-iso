---
modules-search: [ local ]

sequence:
    - show:
        - welcome
        - notesqml@minimal-info
        - locale
        - keyboard
        - packagechooser
        - packagechooser@dm
        - netinstall
        - partition
        - users
        - summary
    - exec:
        - partition
        - mount
        - basestrap
        - machineid
        - packages
        - fstab
        - locale
        - keyboard
        - localecfg
        - luksopenswaphookcfg
        - luksbootkeyfile
        - initcpiocfg
        - initcpio
        - users
        - displaymanager
        - networkcfg
        - hwclock
        - services-artix
        - grubcfg
        - bootloader
        - postcfg
        - umount
    - show:
        - finished

instances:
- id:       dm
  module:   packagechooser
  config:   packagechooser_dm.conf
- id:       minimal-info
  module:   notesqml
  config:   minimal-info.conf

branding: antergos-next-minimal

prompt-install: false

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: false

hide-back-and-next-during-exec: false

quit-at-end: false
