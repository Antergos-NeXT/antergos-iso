---
mode: required

method: netinstall-add

labels:
    step: "Init selection"
    step[de]: "Initauswahl"

default: Dinit

items:
    - id: Dinit
      name: dinit
      description: "Dinit init system"
      screenshot: "/etc/calamares/modules/images/dinit.svg"
      netinstall:
        name: "dinit"
        description: "Dinit init system"
        selected: true
        critical: true
        immutable: false
        expanded: true
        hidden: false
        subgroups:
            - name: "Default"
              description: "Default services"
              selected: true
              hidden: true
              packages:
                - audit-dinit
                - cryptsetup-dinit
                - dbus-dinit
                - dhcpcd-dinit
                - lvm2-dinit
                - mdadm-dinit
            - name: "Cron"
              description: "Cron init"
              selected: true
              packages:
                - cronie-dinit
            - name: "Syslog"
              description: "Syslog init"
              packages:
                - syslog-ng-dinit
                - metalog-dinit
            - name: "Internet"
              description: "Network init"
              packages:
                - avahi-dinit
                - bluez-dinit
                - iptables-dinit
                - krb5-dinit
                - networkmanager-dinit
                - nfs-utils-dinit
                - ntp-dinit
                - openldap-dinit
                - openssh-dinit
                - rpcbind-dinit
                - xinetd-dinit
                - wpa_supplicant-dinit
