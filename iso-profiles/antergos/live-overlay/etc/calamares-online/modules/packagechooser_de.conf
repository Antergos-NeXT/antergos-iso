      screenshot: ""
      netinstall:
        name: "Hyprland"
        selected: true
        critical: false
        packages:
          - hyprland
          - xdg-desktop-portal-hyprland
    - id: COSMIC
      name: "COSMIC"
      description: "Modern Rust-based desktop. Select greetd as DM."
      screenshot: ""
      netinstall:
        name: "COSMIC"
        selected: true
        critical: false
        packages:
          - cosmic
