---
mode: required
method: netinstall-add
labels:
    step: "Desktop Environment"
    step[de]: "Desktop-Umgebung"
default: Plasma
items:
    - id: Plasma
      name: "KDE Plasma"
      description: "Full-featured modern desktop. The default Antergos NeXT experience."
      screenshot: ""
      netinstall:
        name: "KDE Plasma"
        selected: true
        critical: false
        packages:
          - plasma
          - ark
          - dolphin
          - ffmpegthumbs
          - gwenview
          - kate
          - keditbookmarks
          - kfind
          - kgpg
          - kio-admin
          - konsole
          - konversation
          - kwalletmanager
          - okular
          - partitionmanager
    - id: Xfce
      name: "Xfce"
      description: "Lightweight traditional desktop. Fast and low on resources."
      screenshot: ""
      netinstall:
        name: "Xfce"
        selected: true
        critical: false
        packages:
          - xfce4
          - xfce4-goodies
    - id: Cinnamon
      name: "Cinnamon"
      description: "Traditional desktop with modern features (GNOME-based)"
      screenshot: ""
      netinstall:
        name: "Cinnamon"
        selected: true
        critical: false
        packages:
          - cinnamon
          - cinnamon-control-center
          - cinnamon-desktop
          - cinnamon-menus
          - cinnamon-screensaver
          - cinnamon-session
          - cinnamon-settings-daemon
          - cinnamon-translations
    - id: MATE
      name: "MATE"
      description: "Classic desktop — continuation of GNOME 2"
      screenshot: ""
      netinstall:
        name: "MATE"
        selected: true
        critical: false
        packages:
          - mate
          - mate-extra
    - id: LXQt
      name: "LXQt"
      description: "Lightweight Qt-based desktop"
      screenshot: ""
      netinstall:
        name: "LXQt"
        selected: true
        critical: false
        packages:
          - lxqt
    - id: i3
      name: "i3"
      description: "Minimal tiling window manager (keyboard-driven)"
      screenshot: ""
      netinstall:
        name: "i3"
        selected: true
        critical: false
        packages:
          - i3
    - id: Sway
      name: "Sway"
      description: "i3-compatible Wayland compositor"
      screenshot: ""
      netinstall:
        name: "Sway"
        selected: true
        critical: false
        packages:
          - sway
          - swaybg
          - swayidle
          - swaylock
    - id: Hyprland
      name: "Hyprland"
