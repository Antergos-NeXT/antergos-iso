---
modules-search: [ local ]

sequence:
    - show:
        - welcome
        - locale
        - keyboard
        - packagechooser
        - packagechooser@dm
        - netinstall
        - partition
        - users
        - summary
    - exec:
        - partition
        - mount
        - basestrap
        - machineid
        - packages
        - fstab
        - locale
        - keyboard
        - localecfg
        - luksopenswaphookcfg
        - luksbootkeyfile
        - initcpiocfg
        - initcpio
        - users
        - displaymanager
        - networkcfg
        - hwclock
        - shellprocess@enable-services
        - grubcfg
        - bootloader
        - umount
    - show:
        - finished

instances:
- id:       dm
  module:   packagechooser
  config:   packagechooser_dm.conf
- id:       enable-services
  module:   shellprocess
  config:   enable-services.conf

branding: antergos-next

prompt-install: false

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: false

hide-back-and-next-during-exec: false

quit-at-end: false
