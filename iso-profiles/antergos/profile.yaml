---
live-session:
  user: antergos
  password: antergos
  autologin: true
  use-xlibre: true
  services:
    - acpid
    - bluetoothd
    - cronie
    - cupsd
    - syslog-ng
    - NetworkManager
    - sddm
    - power-profiles-daemon
  user-services:
    - dbus
    - pipewire
    - pipewire-pulse
    - wireplumber
rootfs:
  packages:
    - antergos-release
    - antergos-lsb-release
    - qt6-multimedia-ffmpeg
    - falkon
    - vlc
    - calamares
    - python-toml
    - calamares-branding-antergos-next
    - antergos-welcome
    - yay
    - antergos-next-desktop-settings
    - antergos-plasma-theme
    - antergos-sddm-theme
    - antergos-wallpapers
    - antergos-grub-theme
    - hiredis
    - libdbi
    - libesmtp
    - libmaxminddb
    - librabbitmq-c
    - librdkafka
    - mongo-c-driver
    - net-snmp
    - snapper
    - btrfs-progs
    - antergos-layan-theme
    - tela-circle-icon-theme-git
  packages-init:
    dinit:
      - pipewire-dinit
      - pipewire-pulse-dinit
      - wireplumber-dinit
      - userspawn-dinit
      - syslog-ng-dinit
      - sddm-dinit
      - networkmanager-dinit
      - cups-dinit
      - acpid-dinit
      - bluez-dinit
      - cronie-dinit
      - dbus-dinit
      - dbus-dinit-user
      - dhcpcd-dinit
      - power-profiles-daemon-dinit
    openrc:
      - pipewire-openrc
      - pipewire-pulse-openrc
      - wireplumber-openrc
      - syslog-ng-openrc
      - sddm-openrc
      - networkmanager-openrc
      - cups-openrc
    runit:
      - syslog-ng-runit
      - sddm-runit
      - networkmanager-runit
      - cups-runit
    s6:
      - syslog-ng-s6
      - sddm-s6
      - networkmanager-s6
      - cups-s6
livefs:
  packages:
    - mkinitcpio-nfs-utils
    - squashfs-tools
    - calamares-extensions
    - antergos-grub-live
    - virtualbox-guest-utils
    - broadcom-wl
    - antergos-grub-theme
    - plasma-meta
    - ark
    - dolphin
    - ffmpegthumbs
    - gwenview
    - kate
    - keditbookmarks
    - kfind
    - kgpg
    - kio-admin
    - konsole
    - konversation
    - kwalletmanager
    - okular
    - partitionmanager
    - tesseract-data-eng
    - pipewire
    - pipewire-pulse
    - wireplumber
    - sof-firmware
    - alsa-firmware
    - alsa-utils
  packages-init:
    dinit:
      - antergos-live-dinit
      - acpid-dinit
      - bluez-dinit
      - cronie-dinit
      - cups-dinit
      - networkmanager-dinit
      - power-profiles-daemon-dinit
      - sddm-dinit
      - syslog-ng-dinit
      - dbus-dinit
      - dbus-dinit-user
      - pipewire-dinit
      - pipewire-pulse-dinit
      - wireplumber-dinit
      - userspawn-dinit
      - elogind-dinit
    openrc:
      - antergos-live-openrc
    runit:
      - artix-live-runit
    s6:
      - artix-live-s6
